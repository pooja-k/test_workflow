name: Playwright Java Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # FIX: Changed 'actions/actions-setup-java@v4' to 'actions/setup-java@v4'
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build Project & Download Playwright Core
      run: mvn compile test-compile

    - name: Install Playwright Browsers
      run: mvn exec:java -Dexec.mainClass="com.microsoft.playwright.CLI" -Dexec.args="install"

    - name: Run Playwright Tests
      run: mvn test

    - name: Upload TestNG HTML Report
      if: always() 
      uses: actions/upload-artifact@v4
      with:
        name: testng-html-report
        # This grabs TestNG's default report directory
        path: target/surefire-reports/
        retention-days: 7